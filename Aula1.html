<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulary</title>
</head>
<body>
    <h2>Formulário sobre Faculdade</h2>
    <form action="" method="post">
        <fieldset>
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu Nome:" size="50" maxlength="100" required>  
            </div>
            <div class="campo">
                <label for="email">E-Mail:</label>
                <input type="email" name="email" id="email" placeholder="Digite seu E-Mail" size="50" required>
            </div>
            <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" placeholder="Digite sua Senha" size="50" maxlength="16" required>
            </div>
        </fieldset>
        <fieldset>
            <legend>Linguagem que tem Interesse</legend>
            <div class="campo">
                <label><input type="checkbox" name="linguagem[]" value="c++">C++</label>
                <label><input type="checkbox" name="linguagem[]" value="php">PHP</label>
                <label><input type="checkbox" name="linguagem[]" value="delphi">Delphi</label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Qual Curso irá escolher?</legend>
            <div class="campo">
                <label><input type="radio" name="curso" value="c++">C++</label>
                <label><input type="radio" name="curso" value="php">PHP</label>
                <label><input type="radio" name="curso" value="delphi">Delphi</label>
            </div>
        </fieldset>
        <fieldset>
            <legend>Escola</legend>
            <label for="escola">Escolha a sua Escola:</label>
            <div class="campo">
                <select name="escola" id="escola">
                <option value="Campinas">Campinas</option>
                <option value="Rio Preto">Rio Preto</option>
                <option value="São Paulo">São Paulo</option>
                </select>
            </div>
        </fieldset>
        
            <div class="botoes">
                <button type="reset" >Cancelar</button>
                <button type="submit">Enviar</button>
            </div>
        
    </form>
</body>
</html>
